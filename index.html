<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Usuarios</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="card__header">
        <h1>Registro de usuarios</h1>
        <p>Completa el formulario para crear una cuenta.</p>
      </header>

      <div id="alertBox" class="alert hidden" role="alert" aria-live="polite"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName">Nombre completo</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Ej: Juan Pérez"
            maxlength="60"
          />
          <small class="error-text" id="fullNameError"></small>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Ej: juan@email.com"
            maxlength="80"
          />
          <small class="error-text" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            maxlength="30"
          />
          <small class="error-text" id="passwordError"></small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Repite tu contraseña"
            maxlength="30"
          />
          <small class="error-text" id="confirmPasswordError"></small>
        </div>

        <button type="submit" class="btn-primary">Registrarse</button>
      </form>
    </section>

    <section class="card">
      <header class="card__header">
        <h2>Usuarios registrados</h2>
        <p>Lista guardada localmente en el navegador.</p>
      </header>

      <div id="usersContainer" class="users-container"></div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
